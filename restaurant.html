<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Details - DineDash</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0b0b0b; --card: #161616;
            --accent: #ff4757; --border: #222; --text: #ffffff;
            --dim: #888; --nav-bg: rgba(15, 15, 15, 0.9);
        }

        /* Light Mode Styles */
        body.light-mode {
            --bg: #f8f9fa; --card: #ffffff; --text: #1a1a1a;
            --border: #e0e0e0; --nav-bg: rgba(255, 255, 255, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }

        /* --- NAVIGATION --- */
        nav { 
            background: var(--nav-bg); padding: 15px 6%; display: flex; justify-content: space-between; 
            align-items: center; position: fixed; top: 0; width: 100%; z-index: 1000; 
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
        }
        .nav-brand { font-family: 'Playfair Display', serif; color: var(--accent); font-size: 1.8rem; font-weight: 900; text-decoration: none; }
        
        .nav-right { display: flex; gap: 20px; align-items: center; }
        
        /* THEME TOGGLE BUTTON */
        .theme-btn {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 8px 18px; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 0.8rem;
        }

        /* --- HERO BANNER --- */
        .hero-banner { 
            width: 100%; height: 55vh; background-size: cover; background-position: center; 
            position: relative; display: flex; align-items: flex-end; padding-bottom: 60px;
        }
        .hero-banner::after { 
            content: ''; position: absolute; inset: 0; 
            background: linear-gradient(to top, var(--bg), transparent); 
        }
        .hero-content { position: relative; z-index: 10; width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .res-title { font-family: 'Playfair Display', serif; font-size: 4rem; margin-bottom: 10px; }

        /* --- ACTION BOXES --- */
        .action-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; 
            margin-top: -40px; position: relative; z-index: 100; max-width: 1100px; margin-left: auto; margin-right: auto; padding: 0 20px;
        }
        .action-card { 
            background: var(--card); padding: 35px; border-radius: 24px; border: 1px solid var(--border); 
            text-align: center; text-decoration: none; color: var(--text); box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .action-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .action-card .icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }

        /* --- MAIN CONTENT LAYOUT --- */
        .main-layout { display: grid; grid-template-columns: 1.8fr 1.2fr; gap: 50px; margin: 80px auto; max-width: 1100px; padding: 0 20px; }
        
        .description-text { font-size: 1.1rem; color: var(--dim); margin-bottom: 30px; }
        
        .sidebar-card { background: var(--card); padding: 40px; border-radius: 28px; border: 1px solid var(--border); height: fit-content; }
        .info-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .info-label { color: var(--dim); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        /* MAP BOX */
        .map-box { width: 100%; height: 250px; border-radius: 20px; overflow: hidden; margin-top: 30px; border: 1px solid var(--border); }
        iframe { width: 100%; height: 100%; border: none; filter: grayscale(1) invert(0.92); }
        body.light-mode iframe { filter: none; }

        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .gallery-item { width: 100%; height: 250px; border-radius: 20px; object-fit: cover; }

        .back-nav { padding: 120px 6% 0; }
        .back-link { color: var(--accent); text-decoration: none; font-weight: 800; font-size: 0.9rem; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-brand">DineDash</a>
        <div class="nav-right">
            <button class="theme-btn" onclick="toggleTheme()">🌓 Light/Dark Mode</button>
            <a href="dashboard.html" style="background: var(--accent); color: white; padding: 10px 25px; border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 0.85rem;">My Account 👤</a>
        </div>
    </nav>

    <div id="restaurantView"></div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        // Theme Toggle Function
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        function loadRestaurantDetails() {
            const id = localStorage.getItem('selectedRestaurant');
            // Pulling from data.js
            const res = restaurants.find(r => r.id == id);
            
            if(!res) { window.location.href = 'restaurants.html'; return; }

            // Store name for other pages to use
            localStorage.setItem('selectedRestaurantName', res.name);

            document.getElementById('restaurantView').innerHTML = `
                <div class="back-nav">
                    <a href="restaurants.html" class="back-link">← Go back to restaurants</a>
                </div>

                <div class="hero-banner" style="background-image: url('${res.image}')">
                    <div class="hero-content">
                        <h1 class="res-title">${res.name}</h1>
                        <p style="font-size: 1.2rem; font-weight: 500;">${res.cuisine} • ${res.location} • ⭐ ${res.rating} Stars</p>
                    </div>
                </div>

                <div class="action-grid">
                    <a href="food.html" class="action-card">
                        <span class="icon">🍔</span>
                        <h3>Order Food</h3>
                        <p style="font-size:0.85rem; color:var(--dim);">Delicious meals delivered</p>
                    </a>
                    <a href="table.html" class="action-card">
                        <span class="icon">🪑</span>
                        <h3>Book a Table</h3>
                        <p style="font-size:0.85rem; color:var(--dim);">Secure your spot now</p>
                    </a>
                    <a href="event.html" class="action-card">
                        <span class="icon">🎉</span>
                        <h3>Plan an Event</h3>
                        <p style="font-size:0.85rem; color:var(--dim);">Birthdays & Parties</p>
                    </a>
                </div>

                <div class="main-layout">
                    <div>
                        <h2 style="margin-bottom:20px; font-family:'Playfair Display', serif; font-size:2rem;">About this Place</h2>
                        <p class="description-text">${res.description}</p>
                        
                        <div class="gallery">
                            <img class="gallery-item" src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=800">
                            <img class="gallery-item" src="https://images.unsplash.com/photo-1559339352-11d035aa65de?w=800">
                        </div>
                    </div>

                    <div class="sidebar-card">
                        <h3 style="margin-bottom:25px; font-family:'Playfair Display', serif;">Quick Info</h3>
                        <div class="info-row"><span class="info-label">Average Cost</span><strong>${res.price}</strong></div>
                        <div class="info-row"><span class="info-label">Area</span><strong>${res.area || res.location}</strong></div>
                        <div class="info-row"><span class="info-label">Status</span><strong style="color:#2ecc71;">Open Now</strong></div>
                        
                        <div class="map-box">
                            <iframe src="https://maps.google.com/maps?q=${encodeURIComponent(res.name + ' ' + res.location)}&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
                        </div>
                    </div>
                </div>
            `;
        }

        // Apply theme and load content on start
        window.onload = () => {
            if(localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light-mode');
            }
            loadRestaurantDetails();
        };
    </script>
</body>
</html>

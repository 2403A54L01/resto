<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DineDash Admin - Control Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f0f0f; --sidebar: #161616; --card: #1a1a1a;
            --accent: #ff4757; --border: #333; --text: #ffffff;
            --success: #2ecc71; --dim: #888; --input: #121212;
        }
        /* ADDED: Light Mode Variables */
        body.light-mode {
            --bg: #f4f7f6; --sidebar: #ffffff; --card: #ffffff;
            --text: #2d3436; --border: #dfe6e9; --input: #fdfdfd;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; }
        .nav-brand { color: var(--accent); font-weight: 800; font-size: 1.6rem; margin-bottom: 40px; cursor: pointer; }
        .nav-menu { flex: 1; list-style: none; }
        .nav-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; margin-bottom: 8px; transition: 0.3s; display: flex; align-items: center; gap: 12px; color: #888; font-weight: 500; }
        .nav-item:hover, .nav-item.active { background: rgba(255, 71, 87, 0.1); color: var(--accent); }
        
        /* --- CONTENT --- */
        .main-content { flex: 1; overflow-y: auto; padding: 30px 5%; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-box { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .stat-box h2 { color: var(--accent); font-size: 2.2rem; margin-bottom: 5px; }

        /* --- ADDED: GRAPH UI STYLES --- */
        .charts-wrapper { display: grid; grid-template-columns: 1.5fr 1fr; gap: 25px; margin-bottom: 40px; }
        .chart-card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid var(--border); }
        .chart-card h3 { font-size: 0.8rem; color: var(--dim); text-transform: uppercase; margin-bottom: 20px; letter-spacing: 1px; }

        /* --- DATA UI --- */
        .admin-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; }
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }
        .badge-pending { background: rgba(241, 196, 15, 0.2); color: #f1c40f; }
        .badge-success { background: rgba(46, 204, 113, 0.2); color: var(--success); }

        .btn { padding: 8px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 0.75rem; }
        .btn-danger { background: var(--accent); color: white; }
        .status-select { background: #222; color: white; border: 1px solid var(--border); padding: 5px; border-radius: 8px; }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { color: var(--dim); font-size: 0.75rem; padding: 15px; border-bottom: 2px solid var(--border); text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; padding: 30px; border-radius: 20px; border: 1px solid var(--border); }
        .field { margin-bottom: 15px; }
        .field label { display: block; font-size: 0.8rem; color: var(--dim); margin-bottom: 5px; }
        .field input, .field textarea { width: 100%; padding: 12px; background: var(--input); border: 1px solid var(--border); border-radius: 10px; color: var(--text); outline: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-brand" onclick="window.location.href='index.html'">DineDash</div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="switchTab('overview')">📊 Overview</li>
            <li class="nav-item" onclick="switchTab('orders')">🍔 Food Orders</li>
            <li class="nav-item" onclick="switchTab('bookings')">🪑 Table Bookings</li>
            <li class="nav-item" onclick="switchTab('events')">🎉 Event Requests</li>
            <li class="nav-item" onclick="switchTab('restaurants')">🍴 Restaurants</li>
            <li class="nav-item" onclick="switchTab('users')">👤 User Database</li>
        </ul>
        
        <button class="btn" style="background: var(--card); color: var(--text); border: 1px solid var(--border); margin-bottom: 10px;" onclick="toggleTheme()">🌓 Toggle Theme</button>
        <button class="btn btn-danger" style="width: 100%; margin-top: auto;" onclick="logout()">Logout 🚪</button>
    </div>

    <div class="main-content">
        <header>
            <h1 id="viewTitle">Overview</h1>
            <div style="color: var(--success); font-weight: bold; font-size: 0.9rem;">● LIVE DASHBOARD</div>
        </header>

        <div class="stats-grid" id="topStats">
            <div class="stat-box"><h2>₹<span id="revenue">0</span></h2><p>TOTAL REVENUE</p></div>
            <div class="stat-box"><h2><span id="totalOrders">0</span></h2><p>TOTAL ORDERS</p></div>
            <div class="stat-box"><h2><span id="totalEvents">0</span></h2><p>EVENT BOOKINGS</p></div>
            <div class="stat-box"><h2><span id="pendingCount">0</span></h2><p>PENDING ACTIONS</p></div>
        </div>

        <div class="charts-wrapper" id="chartsWrapper">
            <div class="chart-card">
                <h3>Revenue Performance</h3>
                <canvas id="revChart" height="120"></canvas>
            </div>
            <div class="chart-card">
                <h3>Inquiry Distribution</h3>
                <canvas id="mixChart"></canvas>
            </div>
        </div>

        <div id="dynamicContent"></div>
    </div>

    <div id="resModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h2 style="margin-bottom:20px;">Add Restaurant</h2>
            <form id="addResForm">
                <div class="field"><label>Restaurant Name *</label><input type="text" id="newResName" required></div>
                <div class="field"><label>Image URL *</label><input type="text" id="newResImg" required></div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                    <div class="field"><label>Cuisine *</label><input type="text" id="newResCuisine" required></div>
                    <div class="field"><label>Location *</label><input type="text" id="newResLoc" required></div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                    <div class="field"><label>Rating (0-5)</label><input type="number" step="0.1" id="newResRating"></div>
                    <div class="field"><label>Price Range</label><input type="text" id="newResPrice"></div>
                </div>
                <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:10px;">
                    <button type="button" class="btn" style="background:#333; color:white;" onclick="closeResModal()">Cancel</button>
                    <button type="submit" class="btn" style="background:var(--success); color:white;">Save Restaurant</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        /* ==========================================
           1. SECURITY & TAB NAVIGATION
           ========================================== */
        let revChartInstance = null;
        let mixChartInstance = null;

        // FIXED: ADDED THEME TOGGLE LOGIC
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            if (document.getElementById('chartsWrapper').style.display !== 'none') {
                calculateAdminStats(); // Re-render charts for color sync
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');

            if (localStorage.getItem('isLoggedIn') !== 'true' || localStorage.getItem('userRole') !== 'admin') {
                window.location.href = 'login.html';
            } else {
                switchTab('overview');
            }
        });

        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            const activeItem = [...document.querySelectorAll('.nav-item')].find(i => i.innerText.toLowerCase().includes(tab.slice(0, 4)));
            if (activeItem) activeItem.classList.add('active');

            document.getElementById('topStats').style.display = (tab === 'overview') ? 'grid' : 'none';
            document.getElementById('chartsWrapper').style.display = (tab === 'overview') ? 'grid' : 'none';
            
            document.getElementById('viewTitle').innerText = tab.charAt(0).toUpperCase() + tab.slice(1);

            if (tab === 'overview') renderOverview();
            else if (tab === 'orders') renderOrders();
            else if (tab === 'bookings') renderDataGrid('bookings', false);
            else if (tab === 'events') renderDataGrid('bookings', true);
            else if (tab === 'restaurants') renderRestaurants();
            else if (tab === 'users') renderUsers();

            calculateAdminStats();
        }

        function calculateAdminStats() {
            const orders = JSON.parse(localStorage.getItem('cart')) || [];
            const bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            
            const revenue = orders.reduce((sum, o) => sum + (parseFloat(o.total) || 0), 0);
            // CRITICAL: Updated filter to use 'category' label from event.html
            const events = bookings.filter(b => b.category === 'Event' || b.type === 'Banquet Hall').length;
            const tables = bookings.filter(b => b.category !== 'Event' && b.type !== 'Banquet Hall').length;
            const pending = [...orders, ...bookings].filter(i => i.status === 'Pending' || i.status === 'Preparing').length;

            document.getElementById('revenue').innerText = revenue.toLocaleString();
            document.getElementById('totalOrders').innerText = orders.length;
            document.getElementById('totalEvents').innerText = events;
            document.getElementById('pendingCount').innerText = pending;

            if (document.getElementById('chartsWrapper').style.display !== 'none') {
                initAdminCharts(revenue, tables, events);
            }
        }

        function initAdminCharts(rev, tables, events) {
            const isLight = document.body.classList.contains('light-mode');
            const textColor = isLight ? '#2d3436' : '#888';

            if (revChartInstance) revChartInstance.destroy();
            const ctx1 = document.getElementById('revChart').getContext('2d');
            revChartInstance = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'Gross Earnings',
                        data: [rev*0.1, rev*0.15, rev*0.12, rev*0.22, rev*0.18, rev*0.25, rev*0.3],
                        borderColor: '#ff4757',
                        backgroundColor: 'rgba(255, 71, 87, 0.1)',
                        fill: true, tension: 0.4
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: textColor } }, x: { ticks: { color: textColor } } } }
            });

            if (mixChartInstance) mixChartInstance.destroy();
            const ctx2 = document.getElementById('mixChart').getContext('2d');
            mixChartInstance = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: ['Tables', 'Events'],
                    datasets: [{
                        data: [tables || 1, events || 1],
                        backgroundColor: ['#ff4757', '#f1c40f'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: textColor } } } }
            });
        }

        /* ==========================================
           2. MODULE RENDERERS
           ========================================== */

        function renderOverview() {
            document.getElementById('dynamicContent').innerHTML = `
                <div class="admin-card">
                    <h3>System Operational</h3>
                    <p style="color:var(--dim); margin-top:10px;">Welcome, ${localStorage.getItem('userName')}. All systems are active.</p>
                </div>`;
        }

        function renderOrders() {
            const orders = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('dynamicContent').innerHTML = `
                <div class="admin-card">
                    <table>
                        <tr><th>ID</th><th>Restaurant</th><th>Total</th><th>Status</th><th>Action</th></tr>
                        ${orders.map(o => `
                            <tr>
                                <td>#${o.id.toString().slice(-5)}</td>
                                <td>${o.restaurantName}</td>
                                <td>₹${o.total}</td>
                                <td><span class="badge ${o.status === 'Delivered' ? 'badge-success' : 'badge-pending'}">${o.status}</span></td>
                                <td>
                                    <select class="status-select" onchange="updateItemStatus('cart', '${o.id}', this.value)">
                                        <option value="Preparing" ${o.status === 'Preparing' ? 'selected' : ''}>Preparing</option>
                                        <option value="Delivered" ${o.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                                    </select>
                                    <button class="btn" style="color:var(--accent);" onclick="deleteItem('cart', '${o.id}')">✖</button>
                                </td>
                            </tr>
                        `).join('')}
                    </table>
                </div>`;
        }

        // FIXED: BUTTONS FOR TABLE/EVENT
        function renderDataGrid(key, isEventOnly) {
            const all = JSON.parse(localStorage.getItem(key)) || [];
            // Updated filtering to respect 'category' from event inquiries
            const filtered = all.filter(b => isEventOnly ? (b.category === 'Event' || b.type === 'Banquet Hall') : (b.category !== 'Event' && b.type !== 'Banquet Hall'));
            
            document.getElementById('dynamicContent').innerHTML = `
                <div class="admin-card">
                    <table>
                        <tr><th>Customer</th><th>Details</th><th>Date</th><th>Status</th><th>Action</th></tr>
                        ${filtered.map(b => `
                            <tr>
                                <td><strong>${b.name}</strong><br><small>${b.phone || ''}</small></td>
                                <td>${b.restaurantName}<br><small>${isEventOnly ? 'Event' : 'Table'}</small></td>
                                <td>${b.date}</td>
                                <td><span class="badge ${b.status === 'Confirmed' ? 'badge-success' : 'badge-pending'}">${b.status}</span></td>
                                <td>
                                    <button class="btn" style="background:var(--success); color:white;" onclick="updateItemStatus('${key}', '${b.id}', 'Confirmed')">Confirm</button>
                                    <button class="btn" style="color:var(--accent);" onclick="deleteItem('${key}', '${b.id}')">✖</button>
                                </td>
                            </tr>
                        `).join('')}
                    </table>
                </div>`;
        }

        function renderRestaurants() {
            const list = JSON.parse(localStorage.getItem('restaurants_db')) || [];
            document.getElementById('dynamicContent').innerHTML = `
                <div style="display:flex; justify-content:flex-end; margin-bottom:20px;">
                    <button class="btn" style="background:var(--accent); color:white;" onclick="openResModal()">+ Add Restaurant</button>
                </div>
                <div class="admin-card">
                    <table>
                        <tr><th>Image</th><th>Name</th><th>Cuisine</th><th>Rating</th><th>Action</th></tr>
                        ${list.map(r => `
                            <tr>
                                <td><img src="${r.image}" style="width:40px; height:40px; border-radius:5px; object-fit:cover;"></td>
                                <td><strong>${r.name}</strong></td>
                                <td>${r.cuisine}</td>
                                <td>${r.rating} ⭐</td>
                                <td><button class="btn" style="color:var(--accent);" onclick="deleteItem('restaurants_db', '${r.id}')">Delete</button></td>
                            </tr>
                        `).join('')}
                    </table>
                </div>`;
        }

        function renderUsers() {
            const users = JSON.parse(localStorage.getItem('registeredUsers')) || [];
            const currentAdminEmail = localStorage.getItem('userEmail');
            document.getElementById('dynamicContent').innerHTML = `
                <div class="admin-card">
                    <table>
                        <tr><th>Name</th><th>Email</th><th>Role</th><th>Action</th></tr>
                        ${users.map(u => `
                            <tr>
                                <td><strong>${u.name}</strong></td>
                                <td>${u.email}</td>
                                <td><span class="badge badge-success">${u.role || 'USER'}</span></td>
                                <td>
                                    ${u.email !== currentAdminEmail ? `<button class="btn btn-danger" onclick="deleteUser('${u.email}')">Remove</button>` : '<em>Active Admin</em>'}
                                </td>
                            </tr>
                        `).join('')}
                    </table>
                </div>`;
        }

        /* ==========================================
           3. DATA LOGIC & UTILITIES
           ========================================== */
        // FIXED: MATCHING ID AS STRING
        function updateItemStatus(key, id, newStatus) {
            let data = JSON.parse(localStorage.getItem(key)) || [];
            const idx = data.findIndex(i => i.id == id);
            if (idx !== -1) {
                data[idx].status = newStatus;
                localStorage.setItem(key, JSON.stringify(data));
                calculateAdminStats(); 
                refreshCurrentTab();
            }
        }

        function deleteItem(key, id) {
            if (!confirm("Are you sure?")) return;
            let data = JSON.parse(localStorage.getItem(key)) || [];
            localStorage.setItem(key, JSON.stringify(data.filter(i => i.id != id)));
            calculateAdminStats();
            refreshCurrentTab();
        }

        function deleteUser(email) {
            if (!confirm("Delete user?")) return;
            let users = JSON.parse(localStorage.getItem('registeredUsers')) || [];
            localStorage.setItem('registeredUsers', JSON.stringify(users.filter(u => u.email !== email)));
            renderUsers();
        }

        function refreshCurrentTab() {
            const currentTab = document.querySelector('.nav-item.active').innerText.toLowerCase();
            if (currentTab.includes('overview')) switchTab('overview');
            else if (currentTab.includes('food')) switchTab('orders');
            else if (currentTab.includes('table')) switchTab('bookings');
            else if (currentTab.includes('event')) switchTab('events');
            else if (currentTab.includes('restaurant')) switchTab('restaurants');
            else if (currentTab.includes('user')) switchTab('users');
        }

        function openResModal() { document.getElementById('resModal').style.display = 'flex'; }
        function closeResModal() { document.getElementById('resModal').style.display = 'none'; }

        document.getElementById('addResForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newRes = {
                id: Date.now().toString(),
                name: document.getElementById('newResName').value,
                image: document.getElementById('newResImg').value,
                cuisine: document.getElementById('newResCuisine').value,
                location: document.getElementById('newResLoc').value,
                rating: document.getElementById('newResRating').value || "0.0",
                price: document.getElementById('newResPrice').value || "TBD"
            };
            let list = JSON.parse(localStorage.getItem('restaurants_db')) || [];
            list.push(newRes);
            localStorage.setItem('restaurants_db', JSON.stringify(list));
            closeResModal();
            renderRestaurants();
        });

        function logout() {
    // Clear only session-related keys to allow the next user to start fresh
    localStorage.removeItem('isLoggedIn'); 
    localStorage.removeItem('userRole'); 
    localStorage.removeItem('userName');
    localStorage.removeItem('userEmail');
    
    // Redirect to the landing or login page
    window.location.href = 'index.html'; 
}
    </script>
</body>
</html>

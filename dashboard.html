<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - DineDash</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0b; --sidebar: #121212; --card: #181818;
            --accent: #ff4757; --border: #2a2a2a; --text: #ffffff;
            --dim: #a0a0a0; --success: #2ecc71; --warning: #f1c40f;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body.light-mode {
            --bg: #f8f9fa; --sidebar: #ffffff; --card: #ffffff;
            --text: #1a1a1a; --border: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px; }
        .nav-brand { color: var(--accent); font-weight: 900; font-size: 1.8rem; margin-bottom: 50px; text-decoration: none; }
        .nav-menu { flex: 1; list-style: none; }
        .nav-item { padding: 14px 18px; border-radius: 14px; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; color: var(--dim); font-weight: 600; }
        .nav-item:hover, .nav-item.active { background: var(--glass); color: var(--accent); border: 1px solid rgba(255, 71, 87, 0.2); }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; overflow-y: auto; padding: 40px 6%; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }

        /* Professional 4-Column Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 45px; }
        .stat-box { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
        .stat-box h2 { font-size: 2.2rem; font-weight: 800; color: var(--accent); margin-bottom: 5px; }
        .stat-box p { color: var(--dim); font-size: 0.7rem; text-transform: uppercase; font-weight: 700; letter-spacing: 1.5px; }

        /* Reservation Row Style */
        .res-row { 
            background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 25px 35px; 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
        }
        .res-info h4 { font-size: 1.2rem; margin-bottom: 8px; color: #fff; }
        .res-meta { display: flex; gap: 20px; color: var(--dim); font-size: 0.85rem; margin-bottom: 8px; }
        .res-id { color: #444; font-size: 0.75rem; font-family: monospace; letter-spacing: 1px; }

        .status-badge { padding: 6px 16px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .status-pending { background: rgba(241, 196, 15, 0.15); color: var(--warning); border: 1px solid rgba(241, 196, 15, 0.2); }
        .status-confirmed { background: rgba(46, 204, 113, 0.15); color: var(--success); border: 1px solid rgba(46, 204, 113, 0.2); }
        
        .btn-cancel { background: transparent; border: 1px solid #333; color: white; padding: 10px 22px; border-radius: 12px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
        .btn-primary { padding: 14px 28px; background: var(--accent); color: white; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; }
        .btn-logout { width: 100%; padding: 15px; background: rgba(255, 71, 87, 0.1); color: var(--accent); border: 1px solid rgba(255, 71, 87, 0.2); border-radius: 16px; font-weight: 700; cursor: pointer; margin-top: auto; }
        
        .content-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 30px; margin-bottom: 25px; }

        /* Theme Toggle Button */
        .theme-toggle-btn { width: 100%; padding: 14px 18px; background: var(--glass); border: 1px solid var(--border); border-radius: 14px; color: var(--dim); font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 15px; margin-top: 10px; transition: 0.3s; }
        .theme-toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

    <div class="sidebar">
        <a href="index.html" style="text-decoration: none;"><div class="nav-brand">DineDash</div></a>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="switchView('overview', this)">📊 Overview</li>
            <li class="nav-item" onclick="switchView('orders', this)">🍔 My Orders</li>
            <li class="nav-item" onclick="switchView('wallet', this)">💳 Wallet & Rewards</li>
        </ul>
        <button class="theme-toggle-btn" onclick="toggleTheme()"><span class="icon">🌓</span> <span>Switch Theme</span></button>
        <button class="btn-logout" onclick="logout()">Logout 🚪</button>
    </div>

    <div class="main-content">
        <header>
            <div>
                <h1 id="viewTitle" style="font-size: 2.2rem; font-weight: 800;">Welcome!</h1>
                <p id="todayDate" style="color: var(--dim); font-size: 0.9rem; margin-top: 5px;"></p>
            </div>
            <button class="btn-primary" onclick="window.location.href='restaurants.html'">+ New Booking</button>
        </header>

        <div class="stats-grid" id="statsSection"></div>
        <div id="dynamicContent"></div>
    </div>

    <script src="script.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const name = localStorage.getItem('userName') || 'User';
            // Professional greeting with icons
            document.getElementById('viewTitle').innerText = `Good Afternoon, ${name}! 👋`;
            document.getElementById('todayDate').innerText = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            
            applyTheme(); // Sync theme on load
            switchView('overview', document.querySelector('.nav-item.active'));
        });

        function switchView(view, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            const stats = document.getElementById('statsSection');
            const bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            const wallet = JSON.parse(localStorage.getItem('userWallet')) || { balance: 0 };

            // Dynamic 4-Column Stats Grid
            stats.innerHTML = `
                <div class="stat-box"><h2>${bookings.length}</h2><p>Total Bookings</p></div>
                <div class="stat-box"><h2>${bookings.filter(b => b.status === 'Pending').length}</h2><p>Pending</p></div>
                <div class="stat-box"><h2 style="color:var(--success)">${bookings.filter(b => b.status === 'Confirmed').length}</h2><p>Confirmed</p></div>
                <div class="stat-box"><h2>₹${wallet.balance}</h2><p>Wallet Balance</p></div>
            `;

            if (view === 'overview') renderOverview(bookings);
            else if (view === 'orders') renderOnlyOrders();
            else if (view === 'wallet') renderWalletModule();
        }

        function renderOverview(bookings) {
    const container = document.getElementById('dynamicContent');
    
    // 1. Separate the data by category
    const tableBookings = bookings.filter(b => b.category !== 'Event');
    const eventInquiries = bookings.filter(b => b.category === 'Event');

    container.innerHTML = `
        <h3 style="font-size: 0.85rem; letter-spacing: 1.5px; color: var(--dim); text-transform: uppercase; margin-bottom: 25px; font-weight: 800;">Table Reservations</h3>
        <div id="tableList" style="margin-bottom: 50px;">
            ${tableBookings.length > 0 ? tableBookings.map(res => `
                <div class="res-row">
                    <div class="res-info">
                        <h4>${res.restaurantName}</h4>
                        <div class="res-meta">
                            <span>📅 ${res.date}</span>
                            <span>🕒 ${res.time}</span>
                            <span>👥 ${res.guests || '2 People'}</span>
                            <span>🎉 ${res.occasion || 'None'}</span>
                        </div>
                        <div class="res-id">ID: ${res.id}</div>
                    </div>
                    <div style="display: flex; gap: 20px; align-items: center;">
                        <span class="status-badge status-${res.status.toLowerCase()}">${res.status}</span>
                        <button class="btn-cancel" onclick="cancelReservation('${res.id}')">Cancel</button>
                    </div>
                </div>
            `).join('') : '<p style="padding: 20px; color:var(--dim);">No table bookings found.</p>'}
        </div>

        <h3 style="font-size: 0.85rem; letter-spacing: 1.5px; color: var(--gold); text-transform: uppercase; margin-bottom: 25px; font-weight: 800; border-top: 1px solid var(--border); padding-top: 30px;">Event Inquiries</h3>
        <div id="eventList">
            ${eventInquiries.length > 0 ? eventInquiries.map(evt => `
                <div class="res-row" style="border-left: 4px solid var(--gold);">
                    <div class="res-info">
                        <h4 style="color: var(--gold);">${evt.type}</h4>
                        <p style="font-size: 0.9rem; margin-bottom: 10px;">at ${evt.restaurantName}</p>
                        <div class="res-meta">
                            <span>📅 Date: ${evt.date}</span>
                            <span style="color: var(--success); font-weight: 800;">💰 Estimate: ₹${evt.total}</span>
                        </div>
                        <div style="font-size: 0.8rem; color: var(--dim); margin-top: 10px; font-style: italic;">
                            📝 Note: ${evt.details || 'No special requests.'}
                        </div>
                        <div class="res-id" style="margin-top:10px;">ID: ${evt.id}</div>
                    </div>
                    <div style="display: flex; gap: 20px; align-items: center;">
                        <span class="status-badge status-${evt.status.toLowerCase()}">${evt.status}</span>
                        <button class="btn-cancel" onclick="cancelReservation('${evt.id}')">Remove</button>
                    </div>
                </div>
            `).join('') : '<p style="padding: 20px; color:var(--dim);">No event inquiries found.</p>'}
        </div>
    `;
}

        function renderOnlyOrders() {
            const orders = JSON.parse(localStorage.getItem('cart')) || [];
            const container = document.getElementById('dynamicContent');
            container.innerHTML = `
                <div class="content-card">
                    <h3 style="margin-bottom: 20px; color: var(--dim);">Active & Past Orders</h3>
                    ${orders.map(o => {
                        const statusWeight = { 'Preparing': '33%', 'Confirmed': '66%', 'Delivered': '100%' };
                        const progress = statusWeight[o.status] || '10%';
                        return `
                        <div style="padding: 20px 0; border-bottom: 1px solid var(--border);">
                            <div style="display: flex; justify-content: space-between; width: 100%; margin-bottom:10px;">
                                <strong>${o.restaurantName}</strong>
                                <span class="status-badge status-confirmed">${o.status}</span>
                            </div>
                            <div style="width: 100%; height: 6px; background: var(--border); border-radius: 10px; overflow: hidden; margin-bottom:10px;">
                                <div style="width: ${progress}; height: 100%; background: var(--success); transition: 1s ease;"></div>
                            </div>
                            <div style="font-size: 0.85rem; color: var(--dim); background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px;">
                                📋 ${o.items ? o.items.join(', ') : 'Items List'}
                            </div>
                        </div>`;
                    }).join('')}
                </div>
            `;
        }

        function renderWalletModule() {
            const wallet = JSON.parse(localStorage.getItem('userWallet')) || { balance: 0, rewardPoints: 0, history: [] };
            const container = document.getElementById('dynamicContent');
            container.innerHTML = `
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px;">
                    <div class="content-card" style="background: linear-gradient(135deg, #ff4757, #ff6b81); color: white; border: none;">
                        <p style="opacity:0.8; font-size:0.75rem; font-weight:700; text-transform:uppercase;">Balance</p>
                        <h1 style="font-size: 2.8rem; margin: 10px 0;">₹${wallet.balance}</h1>
                    </div>
                    <div class="content-card" style="background: linear-gradient(135deg, #f1c40f, #f39c12); color: white; border: none;">
                        <p style="opacity:0.8; font-size:0.75rem; font-weight:700; text-transform:uppercase;">Rewards</p>
                        <h1 style="font-size: 2.8rem; margin: 10px 0;">${wallet.rewardPoints || 0}</h1>
                        <button onclick="redeemPoints()" style="background:white; color:#f39c12; border:none; padding:10px 20px; border-radius:12px; font-weight:800; cursor:pointer;">Redeem Now 🎁</button>
                    </div>
                </div>
                <div class="content-card">
                    <h3 style="color: var(--dim); margin-bottom: 20px;">Transaction History</h3>
                    ${wallet.history.length > 0 ? wallet.history.slice().reverse().map(h => `
                        <div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid var(--border);">
                            <span><strong>${h.desc}</strong> <br> <small style="color:var(--dim)">${h.date}</small></span>
                            <strong style="color:${h.amount.includes('+') ? 'var(--success)' : 'var(--accent)'}">${h.amount}</strong>
                        </div>
                    `).join('') : '<p style="text-align:center; padding:30px;">No transactions yet.</p>'}
                </div>
            `;
        }

        function cancelReservation(id) {
            if(!confirm("Cancel this reservation?")) return;
            let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            localStorage.setItem('bookings', JSON.stringify(bookings.filter(b => b.id !== id)));
            switchView('overview', document.querySelector('.nav-item.active'));
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('userRole');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>

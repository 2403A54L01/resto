<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - DineDash Executive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0b; --card: #141414; --accent: #ff4757; 
            --text: #ffffff; --dim: #888888; --border: #222222; 
            --nav-bg: rgba(15, 15, 15, 0.9); --gold: #d4af37;
        }

        body.light-mode {
            --bg: #f8f9fa; --card: #ffffff; --text: #1a1a1a;
            --dim: #57606f; --border: #e0e0e0; --nav-bg: rgba(255, 255, 255, 0.95);
        }

        /* MATCHED: theme-btn class from restaurant.html */
        .theme-btn {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 8px 18px; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 0.8rem;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* --- EXECUTIVE NAVIGATION --- */
        nav { 
            background: var(--nav-bg); padding: 15px 6%; display: flex; 
            justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); z-index: 1000; backdrop-filter: blur(15px);
        }
        .logo { font-family: 'Playfair Display', serif; color: var(--accent); font-weight: 900; font-size: 1.8rem; }
        .back-link { color: var(--dim); text-decoration: none; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .back-link:hover { color: var(--accent); }

        /* --- POS LAYOUT --- */
        .pos-container { display: grid; grid-template-columns: 1fr 420px; flex: 1; overflow: hidden; }

        .menu-wrapper { overflow-y: auto; padding: 40px; scroll-behavior: smooth; }
        .search-bar { 
            width: 100%; padding: 18px 25px; border-radius: 16px; border: 1px solid var(--border); 
            background: var(--card); color: var(--text); margin-bottom: 30px; outline: none; font-size: 1rem;
        }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(255, 71, 87, 0.1); }

        /* DIETARY FILTERS */
        .diet-filters { display: flex; gap: 12px; margin-bottom: 25px; }
        .diet-btn { 
            padding: 10px 20px; border-radius: 12px; border: 1px solid var(--border); 
            background: var(--card); color: var(--dim); cursor: pointer; font-size: 0.85rem; font-weight: 700;
        }
        .diet-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(255, 71, 87, 0.05); }

        .category-tabs { display: flex; gap: 15px; margin-bottom: 35px; overflow-x: auto; padding-bottom: 10px; }
        .tab-btn { 
            padding: 10px 22px; border-radius: 50px; border: 1px solid var(--border); 
            background: var(--card); color: var(--dim); cursor: pointer; white-space: nowrap; font-size: 0.85rem; font-weight: 600;
        }
        .tab-btn.active { background: var(--accent); border-color: var(--accent); color: white; box-shadow: 0 10px 20px rgba(255, 71, 87, 0.2); }

        /* MENU GRID */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; }
        .food-card { 
            background: var(--card); border-radius: 28px; overflow: hidden; border: 1px solid var(--border); 
            position: relative; transition: 0.4s;
        }
        .food-card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .food-img { width: 100%; height: 180px; object-fit: cover; filter: brightness(0.9); }
        .food-info { padding: 25px; }
        
        .badge { 
            position: absolute; top: 15px; right: 15px; background: var(--gold); color: black; 
            font-size: 0.65rem; padding: 6px 12px; border-radius: 8px; font-weight: 900; text-transform: uppercase; 
        }

        .add-btn { 
            background: var(--accent); color: white; border: none; padding: 12px 20px; 
            border-radius: 14px; cursor: pointer; font-weight: 800; font-size: 0.8rem; 
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.2);
        }

        /* CART PANEL */
        .cart-panel { background: var(--card); border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 40px; }
        .cart-panel h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 5px; }
        .cart-items { flex: 1; overflow-y: auto; margin-top: 30px; }
        .cart-item { 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; 
            background: rgba(255,255,255,0.02); padding: 18px; border-radius: 20px; border: 1px solid var(--border); 
        }
        
        .qty-controls { display: flex; align-items: center; gap: 15px; background: var(--bg); padding: 5px 12px; border-radius: 12px; }
        .qty-btn { width: 28px; height: 28px; border-radius: 8px; border: none; background: #222; color: white; cursor: pointer; font-weight: bold; }
        .qty-btn:hover { background: var(--accent); }
        
        .total-row { display: flex; justify-content: space-between; font-size: 1.8rem; font-weight: 900; margin-top: 20px; color: var(--accent); }
        .checkout-btn { 
            width: 100%; padding: 22px; background: #2ecc71; color: white; border: none; 
            border-radius: 20px; font-weight: 800; font-size: 1.1rem; cursor: pointer; margin-top: 25px;
            box-shadow: 0 15px 30px rgba(46, 204, 113, 0.2);
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <div class="logo">DineDash</div>
            <a href="restaurants.html" class="back-link">← Change Restaurant</a>
        </div>
        <div class="nav-right" style="display: flex; gap: 20px; align-items: center;">
            <button class="theme-btn" onclick="toggleTheme()">🌓 Light/Dark Mode</button>
            <a href="dashboard.html" style="background: var(--accent); color: white; padding: 10px 25px; border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 0.85rem;">My Account 👤</a>
        </div>
    </nav>

    <div class="pos-container">
        <div class="menu-wrapper">
            <h1 id="resNameHeader" style="font-family:'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 10px;">Select Your Meal</h1>
            <input type="text" id="menuSearch" class="search-bar" placeholder="Search our signature dishes..." oninput="applyAllFilters()">
            
            <div class="diet-filters">
                <button class="diet-btn active" id="filter-all" onclick="setDietaryFilter('all')">All Cuisine</button>
                <button class="diet-btn" id="filter-veg" onclick="setDietaryFilter('veg')">Vegetarian</button>
                <button class="diet-btn" id="filter-nonveg" onclick="setDietaryFilter('nonveg')">Non-Veg</button>
            </div>

            <div class="category-tabs" id="categoryTabs">
                <button class="tab-btn active" onclick="filterByCategory('All', this)">All Categories</button>
                <button class="tab-btn" onclick="filterByCategory('Main Course', this)">Main Course</button>
                <button class="tab-btn" onclick="filterByCategory('Starters', this)">Starters</button>
                <button class="tab-btn" onclick="filterByCategory('Desserts', this)">Desserts</button>
            </div>

            <div class="menu-grid" id="menuGrid"></div>
        </div>

        <div class="cart-panel">
            <h2>Order Summary</h2>
            <p id="resNameSub" style="color: var(--dim); font-size: 0.85rem; font-weight: 600;"></p>
            <div class="cart-items" id="posCartItems"></div>
            <div style="border-top: 1px solid var(--border); padding-top: 25px;">
                <div class="total-row"><span>Total</span><span id="grandTotal">₹0</span></div>
                <button class="checkout-btn" onclick="goToPayment()">Authorize Payment 🔒</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        let currentCategory = 'All';
        let currentDiet = 'all';

        // ADDED: theme toggle logic matching restaurant.html
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        window.addEventListener('DOMContentLoaded', () => {
            // ADDED: load theme preference on start
            if(localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light-mode');
            }

            const resName = localStorage.getItem('selectedRestaurantName') || "Our Kitchen";
            document.getElementById('resNameHeader').innerText = `Menu - ${resName}`;
            document.getElementById('resNameSub').innerText = `📍 Preparing at ${resName}`;
            applyAllFilters();
        });

        // Combined Filter Logic
        function applyAllFilters() {
            let filtered = menuItems;
            const query = document.getElementById('menuSearch').value.toLowerCase();

            if (currentCategory !== 'All') filtered = filtered.filter(i => i.category === currentCategory);
            if (currentDiet === 'veg') filtered = filtered.filter(i => i.isVeg === true);
            if (currentDiet === 'nonveg') filtered = filtered.filter(i => i.isVeg === false);
            if (query) filtered = filtered.filter(i => i.name.toLowerCase().includes(query));

            renderPOSMenu(filtered);
        }

        function setDietaryFilter(diet) {
            currentDiet = diet;
            document.querySelectorAll('.diet-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`filter-${diet}`).classList.add('active');
            applyAllFilters();
        }

        function filterByCategory(cat, btn) {
            currentCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyAllFilters();
        }

        function renderPOSMenu(items) {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = items.map(item => `
                <div class="food-card">
                    ${item.rating > 4.5 ? '<div class="badge">Chef Choice ✨</div>' : ''}
                    <img src="${item.image}" class="food-img">
                    <div class="food-info">
                        <div style="display:flex; align-items:center; margin-bottom: 8px;">
                            <span class="veg-indicator ${item.isVeg ? 'is-veg' : 'is-nonveg'}"></span>
                            <strong style="font-size:1.1rem; font-family:'Playfair Display', serif;">${item.name}</strong>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                            <span style="font-weight:900; color:var(--accent); font-size: 1.2rem;">₹${item.price}</span>
                            <button class="add-btn" onclick="addToPOSCart(${item.id})">ADD +</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Cart Logic
        let posCart = [];
        function addToPOSCart(id) {
            const item = menuItems.find(i => i.id === id);
            const existing = posCart.find(i => i.id === id);
            if (existing) { existing.qty++; } else { posCart.push({ ...item, qty: 1 }); }
            renderPOSCart();
        }
        function updateQty(id, delta) {
            const item = posCart.find(i => i.id === id);
            item.qty += delta;
            if (item.qty <= 0) posCart = posCart.filter(i => i.id !== id);
            renderPOSCart();
        }
        function renderPOSCart() {
            const container = document.getElementById('posCartItems');
            if (posCart.length === 0) {
                container.innerHTML = `<p style="text-align: center; color: var(--dim); margin-top: 50px; font-weight:600;">No items in cart</p>`;
                document.getElementById('grandTotal').innerText = `₹0`;
                return;
            }
            container.innerHTML = posCart.map(item => `
                <div class="cart-item">
                    <div><strong>${item.name}</strong><br><small style="color:var(--accent); font-weight:800;">₹${item.price * item.qty}</small></div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQty(${item.id}, -1)">-</button>
                        <span style="font-weight:900;">${item.qty}</span>
                        <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');
            const total = posCart.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('grandTotal').innerText = `₹${total + Math.floor(total * 0.05)}`;
        }

        function goToPayment() {
            if (posCart.length === 0) return alert("Cart is empty!");
            const total = posCart.reduce((s, i) => s + (i.price * i.qty), 0);
            const grandTotal = total + Math.floor(total * 0.05);

            localStorage.setItem('temp_order', JSON.stringify({
                total: grandTotal,
                restaurantName: localStorage.getItem('selectedRestaurantName') || "DineDash Executive",
                items: posCart.map(i => `${i.name} (x${i.qty})`),
                date: new Date().toLocaleDateString()
            }));
            
            window.location.href = 'payment.html';
        }
    </script>
</body>
</html>
